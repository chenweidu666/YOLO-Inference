# YOLOv5-SU Configuration
model:
  path: "../00-Models/yolov5su_fp32.onnx"
  input_size: [640, 640]

inference:
  conf_threshold: 0.25
  iou_threshold: 0.45

output:
  # Output directory for results
  base_dir: "outputs"
  
paths:
  # Input data paths
  data_dir: "data"
  models_dir: "models"
  
# Create directories automatically if they don't exist
auto_create_dirs: true